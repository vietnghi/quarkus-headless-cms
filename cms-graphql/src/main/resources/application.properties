# ──────────────────────────────────────────────
# Quarkus Headless CMS — GraphQL Module
# ──────────────────────────────────────────────
# SmallRye GraphQL (MicroProfile GraphQL) configuration.
# Applied as defaults; can be overridden in the application configuration.

# GraphiQL UI in dev mode
quarkus.smallrye-graphql.ui.always-include=true

# GraphQL endpoint path
quarkus.smallrye-graphql.root-path=/graphql

# Enable non-nullable fields in schema (MicroProfile GraphQL default)
mp.graphql.defaultNonNull=true

# ──────────────────────────────────────────────
# Query Complexity & Depth Limiting
# ──────────────────────────────────────────────
# Maximum allowed query depth (prevents deeply nested queries)
mp.graphql.query.depth=10

# Maximum complexity score for a query (higher = more expensive)
# Each field costs 1 point by default. Use @Complexity on expensive fields.
mp.graphql.query.complexity=100

# Enable the built-in instrumentation for complexity/depth tracking
# (SmallRye GraphQL enables this automatically when limits are set)
