# Test configuration for deployment module — uses SQLite
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:/tmp/test-cms-deployment.db?cache=shared
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.datasource.jdbc.max-size=1

# Drop and create the database on startup
quarkus.hibernate-orm.database.generation=drop-and-create

# Ignore Jackson serialization config for JSONB columns
quarkus.hibernate-orm.mapping.format.global=ignore

# Disable schema initialization (core_schema table uses JSONB)
cms.schema.init.enabled=false

# Log SQL for debugging during tests
quarkus.hibernate-orm.log.sql=false

# Disable Quarkus DevServices
quarkus.devservices.enabled=false

# Disable proactive HTTP auth to avoid SecurityTransformerBuildItem requirement
quarkus.http.auth.proactive=false
