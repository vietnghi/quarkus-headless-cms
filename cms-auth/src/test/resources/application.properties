# Test configuration for cms-auth module
# Uses SQLite in-memory database for tests

# Random HTTP port to avoid conflicts
quarkus.http.test-port=0

# JWT Signing Key (test-only HMAC secret)
smallrye.jwt.sign.key={\"kty\":\"oct\",\"k\":\"mt_T0W9vhrC0Dcn41E6TowYei4iB5F3L-ikDFsaseew\"}
mp.jwt.verify.issuer=quarkus-headless-cms

# Disable dev services for tests
quarkus.devservices.enabled=false

# SQLite database for tests
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:mem:test
quarkus.datasource.jdbc.driver=org.sqlite.JDBC

# Hibernate
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
# Ignore Jackson serialization config for JSONB columns
quarkus.hibernate-orm.mapping.format.global=ignore
# Disable schema initialization
cms.schema.init.enabled=false
