# Integration Test Configuration
quarkus.cms.enabled=true

# Use H2 in-memory database for integration tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:cms_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=CREATE ALIAS IF NOT EXISTS jsonb_extract_path_text FOR "com.quarkus.cms.it.support.H2JsonbFunctions.extractPathText"

# Use drop-and-create so tables are built from JPA entities (no Flyway needed for tests)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.mapping.format.global=ignore

# Disable Flyway during tests (schema is managed by Hibernate drop-and-create)
quarkus.flyway.migrate-at-start=false

# Disable auth for integration tests
quarkus.cms.auth.api-tokens.enabled=false

# JWT configuration for security context
smallrye.jwt.sign.key={"kty":"oct","k":"mt_T0W9vhrC0Dcn41E6TowYei4iB5F3L-ikDFsaseew"}
mp.jwt.verify.issuer=quarkus-headless-cms

# Enable schema initialization for integration tests
# H2 in PostgreSQL mode supports JSON columns — the JSONB mapping works correctly
cms.schema.init.enabled=true

# OpenAPI/Swagger configuration
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=Quarkus Headless CMS API
mp.openapi.extensions.smallrye.info.version=1.0.0-SNAPSHOT

# Enable sample content seeder to register content types needed by tests
# Tests that need clean state call CmsEntry.deleteAll() in @BeforeEach
cms.sample-content.enabled=true

# Testing
quarkus.http.test-port=0
quarkus.log.level=WARN

# Disable Quarkus Dev Services for PostgreSQL — tests use explicit Testcontainers via PostgresTestResource
quarkus.postgresql.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
