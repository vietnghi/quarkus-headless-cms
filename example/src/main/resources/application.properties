# Quarkus Headless CMS Example Application
#
# This configuration demonstrates the full setup for a Quarkus application
# using the headless CMS extension. Uncomment and adjust settings as needed.

# CMS Configuration
quarkus.cms.enabled=true
quarkus.cms.api.base-path=/api
quarkus.cms.admin.base-path=/admin
quarkus.cms.schema.directory=schemas
quarkus.cms.default-locale=en
# Disable automatic schema loading from JSON files (all schemas registered programmatically)
cms.schema.init.enabled=false

# CMS Media
quarkus.cms.media.max-upload-size=10M
quarkus.cms.media.storage-provider=local
quarkus.cms.media.upload-directory=uploads

# CMS Auth
quarkus.cms.auth.jwt.expiration-seconds=86400
quarkus.cms.auth.api-tokens.enabled=true

# ──────────────────────────────────────────────
# Production Profile (PostgreSQL + Connection Pooling)
# ──────────────────────────────────────────────
# Activate with: -Dquarkus.profile=prod or QUARKUS_PROFILE=prod
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=cms_user
%prod.quarkus.datasource.password=cms_password
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/cms_db

# Agroal connection pool sizing
%prod.quarkus.datasource.jdbc.min-size=2
%prod.quarkus.datasource.jdbc.max-size=20
%prod.quarkus.datasource.jdbc.initial-size=2
%prod.quarkus.datasource.jdbc.acquisition-timeout=5s
%prod.quarkus.datasource.jdbc.max-lifetime=PT15M
%prod.quarkus.datasource.jdbc.idle-removal=PT5M
%prod.quarkus.datasource.jdbc.validation-query=SELECT 1
%prod.quarkus.datasource.jdbc.log-sql=false

# ──────────────────────────────────────────────
# SQL Server Profile (alternative production DB)
# ──────────────────────────────────────────────
# Activate with: -Dquarkus.profile=mssql or QUARKUS_PROFILE=mssql
# %mssql.quarkus.datasource.db-kind=mssql
# %mssql.quarkus.datasource.username=cms_user
# %mssql.quarkus.datasource.password=cms_password
# %mssql.quarkus.datasource.jdbc.url=jdbc:sqlserver://localhost:1433;databaseName=cms_db;encrypt=true;trustServerCertificate=true
# %mssql.quarkus.datasource.jdbc.min-size=2
# %mssql.quarkus.datasource.jdbc.max-size=20
# %mssql.quarkus.datasource.jdbc.acquisition-timeout=5s
# %mssql.quarkus.datasource.jdbc.max-lifetime=PT15M
# %mssql.quarkus.datasource.jdbc.idle-removal=PT5M
# %mssql.quarkus.datasource.jdbc.validation-query=SELECT 1
# %mssql.quarkus.hibernate-orm.database.generation=none
# %mssql.quarkus.flyway.migrate-at-start=true
# %mssql.quarkus.flyway.locations=db/migration
# %mssql.quarkus.flyway.baseline-on-migrate=true

# Hibernate — use Flyway for schema management in production (no auto DDL)
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.type.json.mapper=jsonb

# Flyway — manage schema migrations in production
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.locations=db/migration
%prod.quarkus.flyway.baseline-on-migrate=true

# ──────────────────────────────────────────────
# Dev mode defaults (H2 in-memory for dev)
# ──────────────────────────────────────────────
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:cms;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1

# Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
# Use JSON-B for Hibernate JSON format mapper (avoids JacksonJsonFormatMapper null-ObjectMapper startup issue)
quarkus.hibernate-orm.type.json.mapper=jsonb
# quarkus.hibernate-orm.fetch.batch-size=16
# Second-level cache (Infinispan or Caffeine)
# quarkus.hibernate-orm.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory

# Flyway (disabled in dev with drop-and-create; enable for production)
quarkus.flyway.migrate-at-start=false

# ──────────────────────────────────────────────
# OpenAPI / Swagger Documentation
# ──────────────────────────────────────────────
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.enabled=true
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=Quarkus Headless CMS API
mp.openapi.extensions.smallrye.info.version=1.0.0-SNAPSHOT
mp.openapi.extensions.smallrye.info.description=Strapi v5-compatible headless CMS built on Quarkus — dynamic content-type CRUD, bulk operations, batch endpoint, relations, and schema introspection.
mp.openapi.extensions.smallrye.info.contact.name=Quarkus CMS Team
mp.openapi.extensions.smallrye.info.contact.email=dev@quarkus-cms.example.com
mp.openapi.extensions.smallrye.tags.scheme=default

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true

# Dev UI
quarkus.dev-ui.enabled=true

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
mp.openapi.extensions.smallrye.info.title=Quarkus Headless CMS API
mp.openapi.extensions.smallrye.info.version=1.0.0-SNAPSHOT

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.quarkus.cms".level=DEBUG
