# Test configuration for the Quarkus Headless CMS Example App
# Disables DevServices for PostgreSQL (not needed for unit/integration tests with SQLite)
quarkus.devservices.enabled=false

# Use SQLite in PostgreSQL compatibility mode for tests
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:/tmp/test-example.db?cache=shared
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect

# Hibernate - drop and create schema for each test run
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
# Disable Flyway for tests (we use drop-and-create)
quarkus.flyway.migrate-at-start=false

# Disable CMS schema init from JSON files (all schemas registered programmatically by DemoDataSeeder)
cms.schema.init.enabled=false

# Ignore Quarkus Jackson/Hibernate format mapper cross-check
# (example module provides its own JacksonJsonFormatMapper producer)
quarkus.hibernate-orm.mapping.format.global=ignore

# Logging
quarkus.log.level=WARN
quarkus.log.category."com.quarkus.cms".level=INFO

# SmallRye GraphQL disabled to avoid pre-existing CmsGraphQLResource schema generation issue
quarkus.smallrye-graphql.enable=false
