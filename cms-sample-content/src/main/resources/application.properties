# =============================================================================
# Sample Content Module — Application Configuration
# =============================================================================

# Sample content seeder: set to false to disable auto-seeding
cms.sample-content.enabled=true

# Database configuration (H2 for dev, PostgreSQL for prod)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:cms;DB_CLOSE_DELAY=-1

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/cms_demo

# Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Disable Flyway for dev (we use Hibernate DDL generation)
%dev.quarkus.flyway.migrate=false

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.quarkus.cms.samplecontent".level=INFO
