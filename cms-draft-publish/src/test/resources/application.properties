# Test configuration for cms-draft-publish module
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.max-size=2

# Drop and create the database on startup
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable schema initialization (core_schema table uses JSONB, unsupported by SQLite)
cms.schema.init.enabled=false

# Log SQL for debugging during tests
quarkus.hibernate-orm.log.sql=false

# Disable Quarkus DevServices — tests use explicit Testcontainers
quarkus.devservices.enabled=false
